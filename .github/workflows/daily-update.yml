name: Daily Repo Update

on:
  schedule:
    - cron: '0 9 * * *'       # Daily at 9:00 AM UTC
  workflow_dispatch:           # Allows manual triggering

jobs:
  update-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # <-- important for push access

      - name: 24f1000451@ds.study.iitm.ac.in - Make a daily commit
        run: |
          echo "Daily update $(date '+%Y-%m-%d %H:%M:%S')" >> daily-update.txt
          git config user.name "GitHub Actions"
          git config user.email "24f1000451@ds.study.iitm.ac.in"
          git add daily-update.txt
          git commit -m "Automated daily update" --allow-empty
          git push
